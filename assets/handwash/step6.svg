<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" role="img" aria-label="Langkah 6: gosok memutar ujung jari di telapak tangan">
  <defs>
    <marker id="a6" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#0f6e6e"/></marker>
    <style>.h{fill:#efd8c3;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.hl{fill:#ec6b6e;opacity:.7}.ar{fill:none;stroke:#0f6e6e;stroke-width:4.5;stroke-linecap:round}</style>
  </defs>
  <!-- open palm base -->
  <g class="h" transform="translate(40,55)"><rect x="0" y="0" width="120" height="86" rx="26"/></g>
  <!-- fingertips of other hand cupped, highlighted dots -->
  <g class="hl"><circle cx="86" cy="86" r="12"/><circle cx="112" cy="80" r="12"/><circle cx="138" cy="82" r="12"/><circle cx="162" cy="90" r="12"/></g>
  <!-- small circular motion arrows -->
  <path class="ar" d="M96,68 A16,16 0 1 1 92,62" marker-end="url(#a6)"/>
  <path class="ar" d="M150,72 A16,16 0 1 1 146,66" marker-end="url(#a6)"/>
</svg>
