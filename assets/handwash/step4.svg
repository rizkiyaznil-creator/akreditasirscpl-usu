<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" role="img" aria-label="Langkah 4: gosok punggung jari dengan posisi saling mengunci">
  <defs>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#0f6e6e"/></marker>
    <style>.h{fill:#efd8c3;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.f2{fill:#e7c9ad;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.hl{fill:#ec6b6e;opacity:.5}.ar{fill:none;stroke:#0f6e6e;stroke-width:5;stroke-linecap:round}</style>
  </defs>
  <!-- left palm -->
  <g class="h" transform="translate(24,44)"><rect x="0" y="0" width="66" height="90" rx="20"/></g>
  <!-- right palm -->
  <g class="f2" transform="translate(170,44)"><rect x="0" y="0" width="66" height="90" rx="20"/></g>
  <!-- interlocked (hooked) fingers in center -->
  <rect class="hl" x="86" y="60" width="88" height="42" rx="14"/>
  <g class="h"><path d="M86,66 h40 a12,12 0 0 1 12,12 v6 a12,12 0 0 1 -12,12 h-40" fill="#efd8c3" stroke="#c79f79" stroke-width="3"/></g>
  <g class="f2"><path d="M174,96 h-40 a12,12 0 0 1 -12,-12 v-6 a12,12 0 0 1 12,-12 h40" fill="#e7c9ad" stroke="#c79f79" stroke-width="3"/></g>
  <path class="ar" d="M118,150 H142" marker-end="url(#a4)"/>
</svg>
