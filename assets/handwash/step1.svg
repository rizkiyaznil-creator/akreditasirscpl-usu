<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" role="img" aria-label="Langkah 1: gosok kedua telapak tangan">
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#0f6e6e"/></marker>
    <style>.h{fill:#efd8c3;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.hl{fill:#ec6b6e;opacity:.45}.ar{fill:none;stroke:#0f6e6e;stroke-width:5;stroke-linecap:round}</style>
  </defs>
  <!-- left hand -->
  <g class="h" transform="translate(40,30)"><rect x="10" y="55" width="80" height="82" rx="22"/><rect x="16" y="8" width="15" height="55" rx="7"/><rect x="34" y="0" width="15" height="63" rx="7"/><rect x="52" y="4" width="15" height="59" rx="7"/><rect x="69" y="16" width="14" height="48" rx="7"/><rect x="78" y="72" width="36" height="16" rx="8" transform="rotate(30 78 80)"/></g>
  <!-- right hand (mirrored, overlapping) -->
  <g class="h" transform="translate(220,30) scale(-1,1)"><rect x="10" y="55" width="80" height="82" rx="22"/><rect x="16" y="8" width="15" height="55" rx="7"/><rect x="34" y="0" width="15" height="63" rx="7"/><rect x="52" y="4" width="15" height="59" rx="7"/><rect x="69" y="16" width="14" height="48" rx="7"/><rect x="78" y="72" width="36" height="16" rx="8" transform="rotate(30 78 80)"/></g>
  <ellipse class="hl" cx="130" cy="110" rx="52" ry="34"/>
  <path class="ar" d="M104,150 A40,40 0 1 0 156,150" marker-end="url(#a1)"/>
</svg>
