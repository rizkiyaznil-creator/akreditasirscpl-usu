<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" role="img" aria-label="Langkah 3: gosok kedua telapak dengan jari saling menyilang">
  <defs>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#0f6e6e"/></marker>
    <style>.h{fill:#efd8c3;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.f2{fill:#e7c9ad;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.hl{fill:#ec6b6e;opacity:.5}.ar{fill:none;stroke:#0f6e6e;stroke-width:5;stroke-linecap:round}</style>
  </defs>
  <!-- two palms base -->
  <g class="h"><rect x="60" y="92" width="140" height="60" rx="20"/></g>
  <rect class="hl" x="82" y="34" width="96" height="66" rx="14"/>
  <!-- interlaced fingers: set A (front) -->
  <g class="h"><rect x="86" y="34" width="15" height="66" rx="7"/><rect x="122" y="34" width="15" height="66" rx="7"/><rect x="158" y="34" width="15" height="66" rx="7"/></g>
  <!-- set B (behind) -->
  <g class="f2"><rect x="104" y="34" width="15" height="66" rx="7"/><rect x="140" y="34" width="15" height="66" rx="7"/></g>
  <path class="ar" d="M110,166 H150" marker-end="url(#a3)"/>
</svg>
