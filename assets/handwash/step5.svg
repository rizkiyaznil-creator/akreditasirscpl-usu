<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" role="img" aria-label="Langkah 5: gosok memutar ibu jari dalam genggaman telapak">
  <defs>
    <marker id="a5" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#0f6e6e"/></marker>
    <style>.h{fill:#efd8c3;stroke:#c79f79;stroke-width:3;stroke-linejoin:round}.hl{fill:#ec6b6e;opacity:.55}.ar{fill:none;stroke:#0f6e6e;stroke-width:5;stroke-linecap:round}</style>
  </defs>
  <!-- fist (grasping hand) -->
  <g class="h" transform="translate(60,55)"><rect x="0" y="0" width="96" height="86" rx="24"/><rect x="6" y="-14" width="86" height="26" rx="12"/></g>
  <!-- thumb sticking up, highlighted -->
  <rect class="hl" x="150" y="34" width="30" height="70" rx="15"/>
  <g class="h"><rect x="150" y="34" width="30" height="70" rx="15"/></g>
  <path class="ar" d="M186,58 A22,22 0 1 1 182,50" marker-end="url(#a5)"/>
</svg>
