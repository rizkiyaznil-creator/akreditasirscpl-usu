<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Logo RS CPL USU">
  <defs>
    <style>
      .sh{fill:#adadad}
      .or{fill:#ea5330}
      .cr{fill:#ec6b6e}
    </style>
  </defs>
  <!-- Seluruh palang dimiringkan sedikit; tiap ubin punya jitter kecil + bayangan abu-abu ke bawah-kanan -->
  <g transform="rotate(7 256 256)">
    <!-- Atas -->
    <g transform="rotate(-4 256 112)">
      <rect class="sh" x="194.5" y="56.5" width="123" height="123" rx="4"/>
      <rect class="or" x="188"   y="50"   width="123" height="123" rx="4"/>
    </g>
    <!-- Kiri -->
    <g transform="rotate(3 112 256)">
      <rect class="sh" x="56.5"  y="200.5" width="123" height="123" rx="4"/>
      <rect class="or" x="50"    y="194"   width="123" height="123" rx="4"/>
    </g>
    <!-- Kanan -->
    <g transform="rotate(-3 400 256)">
      <rect class="sh" x="344.5" y="200.5" width="123" height="123" rx="4"/>
      <rect class="or" x="338"   y="194"   width="123" height="123" rx="4"/>
    </g>
    <!-- Bawah -->
    <g transform="rotate(4 256 400)">
      <rect class="sh" x="194.5" y="344.5" width="123" height="123" rx="4"/>
      <rect class="or" x="188"   y="338"   width="123" height="123" rx="4"/>
    </g>
    <!-- Tengah (coral) -->
    <g transform="rotate(-2 256 256)">
      <rect class="sh" x="200.5" y="200.5" width="123" height="123" rx="4"/>
      <rect class="cr" x="194"   y="194"   width="123" height="123" rx="4"/>
    </g>
  </g>
</svg>
