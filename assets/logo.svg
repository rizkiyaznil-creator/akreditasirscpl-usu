<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 540" role="img" aria-label="Logo RS CPL USU">
  <defs>
    <style>
      .sh{fill:#9e9e9e}
      .pg{fill:#ffffff}
      .or{fill:#ea5330}
      .cr{fill:#e9696b}
    </style>
  </defs>
  <!-- Tiap ubin: bayangan abu-abu, lembar putih, lalu kotak oranye di atas (efek tumpukan) -->
  <!-- Atas -->
  <g transform="rotate(4 260 110)">
    <rect class="sh" x="177" y="45"  width="150" height="150" rx="8"/>
    <rect class="pg" x="182" y="40"  width="150" height="150" rx="8"/>
    <rect class="or" x="185" y="35"  width="150" height="150" rx="8"/>
  </g>
  <!-- Kiri -->
  <g transform="rotate(-5 100 270)">
    <rect class="sh" x="17"  y="205" width="150" height="150" rx="8"/>
    <rect class="pg" x="22"  y="200" width="150" height="150" rx="8"/>
    <rect class="or" x="25"  y="195" width="150" height="150" rx="8"/>
  </g>
  <!-- Kanan -->
  <g transform="rotate(6 420 270)">
    <rect class="sh" x="337" y="205" width="150" height="150" rx="8"/>
    <rect class="pg" x="342" y="200" width="150" height="150" rx="8"/>
    <rect class="or" x="345" y="195" width="150" height="150" rx="8"/>
  </g>
  <!-- Bawah -->
  <g transform="rotate(-3 260 430)">
    <rect class="sh" x="177" y="365" width="150" height="150" rx="8"/>
    <rect class="pg" x="182" y="360" width="150" height="150" rx="8"/>
    <rect class="or" x="185" y="355" width="150" height="150" rx="8"/>
  </g>
  <!-- Tengah (coral) -->
  <g transform="rotate(2 260 270)">
    <rect class="sh" x="177" y="205" width="150" height="150" rx="8"/>
    <rect class="pg" x="182" y="200" width="150" height="150" rx="8"/>
    <rect class="cr" x="185" y="195" width="150" height="150" rx="8"/>
  </g>
</svg>
